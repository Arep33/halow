<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Untuk pacarku tersayang - Rena</title>
    
    <link rel="stylesheet" href="https://pyscript.net/releases/2024.1.1/core.css">
    <script type="module" src="https://pyscript.net/releases/2024.1.1/core.js"></script>

    <style>
        html, body { 
            height: 100%; margin: 0; padding: 0; 
            background-color: black;
            overflow-x: hidden;
        }

        body { 
            background-image: url('background.jpg'); 
            background-position: center center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            background-size: cover;
            font-family: 'Inter', sans-serif; 
            display: flex; flex-direction: column; align-items: center;
            min-height: 100dvh; 
            padding: calc(env(safe-area-inset-top) + 110px) 20px 80px 20px;
            transition: background-color 0.5s ease;
        }

        /* --- MODE FOKUS TOTAL --- */
        body.focus-mode { 
            background-image: none !important; 
            background-color: black !important; 
        }

        /* Menyembunyikan SEMUA elemen kecuali Hati saat mode fokus */
        body.focus-mode .hide-on-focus, 
        body.focus-mode #special-note,
        body.focus-mode .controls-container { 
            opacity: 0 !important; 
            pointer-events: none !important; 
            visibility: hidden !important; 
        }

        /* Menghilangkan background box putih saat fokus agar hanya hati yang sisa */
        body.focus-mode #main-box {
            background: transparent !important;
            border: none !important;
            box-shadow: none !important;
            backdrop-filter: none !important;
        }

        body.gallery-fit { background-size: contain !important; }

        #rainCanvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 5; }

        #main-box {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            padding: 25px; border-radius: 35px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.5);
            text-align: center; width: 100%; max-width: 350px;
            position: relative; z-index: 10; border: 1px solid white;
            padding-top: 65px;
            transition: all 0.5s ease;
        }

        .heart-watermark {
            position: absolute; top: -85px; left: 50%; transform: translateX(-50%);
            z-index: 100; width: 160px; height: 160px;
            filter: drop-shadow(0 12px 24px rgba(255, 77, 109, 0.5));
            cursor: pointer;
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        /* Posisi hati saat fokus (ke tengah layar) */
        body.focus-mode .heart-watermark {
            top: 50%;
            transform: translate(-50%, -50%) scale(1.3);
            position: fixed;
        }

        .header-box { background: linear-gradient(135deg, #ff4d6d 0%, #a855f7 100%); color: white; padding: 15px; border-radius: 20px; margin-bottom: 20px; }
        .input-wrapper { display: flex; gap: 8px; margin-bottom: 10px; }
        .input-field { flex: 1; padding: 14px; border-radius: 15px; border: 2px solid #f1f5f9; font-size: 16px; outline: none; }
        .btn-add { background: #ff4d6d; color: white; border: none; padding: 0 18px; border-radius: 15px; cursor: pointer; font-weight: 900; }
        .btn-sort { background: #1e293b; color: white; padding: 16px; border: none; border-radius: 18px; cursor: pointer; font-weight: 800; width: 100%; text-transform: uppercase; margin-bottom: 15px; }
        
        #output-container { display: none; }
        .section-title { font-size: 10px; font-weight: 900; color: #94a3b8; text-transform: uppercase; display: block; text-align: left; margin: 15px 0 8px 5px; }
        #output-new { background: #fff5f7; border: 2px solid #ff4d6d; border-radius: 20px; padding: 15px; text-align: left; margin-bottom: 10px; }
        #output-history { background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 20px; padding: 15px; text-align: left; max-height: 250px; overflow-y: auto; margin-bottom: 15px; }
        .label-xs { font-size: 8px; font-weight: 800; color: #64748b; text-transform: uppercase; display: block; margin-top: 4px; }
        .val-txt { font-family: monospace; font-size: 12px; color: #1e293b; word-break: break-all; margin-bottom: 4px; }
        .hist-item { font-size: 11px; padding: 10px 0; border-bottom: 1px solid #edf2f7; }
        .hist-meta { font-size: 9px; color: #ff4d6d; font-weight: bold; display: block; }
        .btn-reset-normal { background: #f1f5f9; color: #64748b; border: 1px solid #e2e8f0; padding: 8px 16px; border-radius: 10px; cursor: pointer; font-size: 11px; font-weight: 700; }

        #special-note { display: none; width: 100%; max-width: 320px; background: #fffef0; padding: 20px; margin-top: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.1), inset 25px 0 0 -24px #ff4d6d; position: relative; z-index: 10; transform: rotate(-1deg); transition: opacity 0.5s; }
        
        .controls-container { position: fixed; bottom: 30px; right: 20px; display: flex; flex-direction: column; gap: 10px; z-index: 110; transition: opacity 0.5s; }
        .control-btn { background: white; border: none; padding: 10px 15px; border-radius: 12px; cursor: pointer; font-size: 10px; font-weight: 800; box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
    </style>
</head>
<body>

    <canvas id="rainCanvas"></canvas>

    <div id="main-box">
        <div class="heart-watermark" onclick="handleHeartClick()">
            <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                <path fill="#ff4d6d" d="M50,95 C50,95 5,65 5,35 A22,22 0,0,1 50,25 A22,22 0,0,1 95,35 C95,65 50,95 50,95 Z"/>
                <text x="50" y="48" text-anchor="middle" font-family="serif" font-weight="bold" font-size="18" fill="#ffffff">A&R</text>
            </svg>
        </div>

        <div class="hide-on-focus">
            <div class="header-box">
                <h2 style="margin:0; font-size: 18px;">Halo pacar aku</h2>
            </div>
            <div class="input-wrapper">
                <input type="text" id="single-input" class="input-field" placeholder="Angka-nya masukin disini sayang...">
                <button id="add-btn" class="btn-add">+</button>
            </div>
            <div id="temp-list" style="font-size:11px; color:#64748b; margin-bottom:15px; text-align:left;">Angka yang kamu masukin: -</div>
            <button id="sort-btn" class="btn-sort">Pencet ini sayang buat ngurutin</button>
            <div id="output-container">
                <span class="section-title">Hasilnya</span>
                <div id="output-new"><span class="label-xs">Sebelum urut:</span><div id="new-before" class="val-txt"></div><span class="label-xs" style="color:#ff4d6d">Sesudah urut:</span><div id="new-after" class="val-txt" style="font-weight:bold; color:#ff4d6d;"></div></div>
                <span class="section-title">Riwayatnya</span>
                <div id="output-history"><div id="history-list"></div></div>
                <button id="full-reset-btn" class="btn-reset-normal">Mulai Ulang</button>
            </div>
        </div>
    </div>

    <div id="special-note">
        <div style="font-family:serif; font-size:12px; color:#ff4d6d; font-weight:bold; border-bottom:1px solid #eee; margin-bottom:5px;">Pesan</div>
        <div style="font-family:monospace; font-size:11px; color:#444;">Angkanya sudah urut ya Rena sayang! ❤️</div>
    </div>

    <div class="controls-container">
        <button onclick="document.body.classList.toggle('gallery-fit')" class="control-btn">Lihat foto my pacar</button>
        <button id="hide-btn" onclick="toggleBox()" class="control-btn">Sembunyikan Box</button>
    </div>

    <script>
        const canvas = document.getElementById('rainCanvas');
        const ctx = canvas.getContext('2d');
        let animationFrame, isRaining = false, words = [];

        function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        class Word {
            constructor() { this.init(true); }
            init(randomY = false) {
                this.x = Math.random() * (canvas.width * 1.2); 
                this.y = randomY ? Math.random() * canvas.height : -50;
                this.speedY = 1.5; this.speedX = -0.5;  
                this.fontSize = 15; this.opacity = 0.7;
            }
            update() {
                this.y += this.speedY; this.x += this.speedX;
                if (this.y > canvas.height + 50 || this.x < -200) this.init(false);
            }
            draw() {
                ctx.fillStyle = `rgba(255, 77, 109, ${this.opacity})`;
                ctx.font = `bold ${this.fontSize}px 'Inter'`;
                ctx.fillText("aku sayang kamu rena", this.x, this.y);
            }
        }

        function handleHeartClick() {
            const isFocus = document.body.classList.toggle('focus-mode');
            if (isFocus) {
                isRaining = true;
                words = Array.from({ length: 30 }, () => new Word());
                (function anim() { 
                    ctx.clearRect(0,0,canvas.width,canvas.height); 
                    words.forEach(w=>{w.update();w.draw()}); 
                    animationFrame = requestAnimationFrame(anim); 
                })();
            } else {
                isRaining = false;
                cancelAnimationFrame(animationFrame);
                ctx.clearRect(0,0,canvas.width,canvas.height);
            }
        }

        function toggleBox() {
            const box = document.getElementById('main-box');
            const isH = box.style.opacity === "0";
            box.style.opacity = isH ? "1" : "0";
            box.style.pointerEvents = isH ? "auto" : "none";
            document.getElementById('hide-btn').innerText = isH ? "Sembunyi Box" : "Muncul Box";
        }
    </script>

    <script type="py">
        from js import document, window
        from pyodide.ffi import create_proxy
        from datetime import datetime

        current_draft = []

        def format_number(num):
            if num == int(num): return str(int(num))
            return str(round(num, 3))

        def parse_input(value):
            value = value.strip().replace(',', '.')
            if ' ' in value:
                parts = value.split(' ')
                whole = float(parts[0])
                frac = parts[1]
                if '/' in frac:
                    n, d = frac.split('/')
                    return whole + (float(n) / float(d))
            elif '/' in value:
                n, d = value.split('/')
                return float(n) / float(d)
            return float(value)

        def add_data(event):
            input_el = document.getElementById("single-input")
            temp_display = document.getElementById("temp-list")
            val = input_el.value.strip()
            if not val: return
            try:
                num_val = parse_input(val)
                current_draft.append(num_val)
                input_el.value = ""
                temp_display.innerText = "Disini angka-nya ya sayang: " + ", ".join([format_number(x) for x in current_draft])
            except: window.alert("Cuma bisa angka sayaanggg")

        def reset_all(event):
            global current_draft
            current_draft = []
            document.getElementById("temp-list").innerText = "Draft: -"
            document.getElementById("output-container").style.display = "none"
            document.getElementById("special-note").style.display = "none"
            document.getElementById("history-list").innerHTML = ""

        def run_sort(event):
            global current_draft
            if not current_draft: return
            document.getElementById("output-container").style.display = "block"
            document.getElementById("special-note").style.display = "block"
            before_str = ", ".join([format_number(x) for x in current_draft])
            sorted_data = sorted(current_draft)
            after_str = ", ".join([format_number(x) for x in sorted_data])
            now = datetime.now()
            days = ["Senin", "Selasa", "Rabu", "Kamis", "Jumat", "Sabtu", "Minggu"]
            full_time = f"{days[now.weekday()]}, {now.strftime('%H:%M:%S')}"
            document.getElementById("new-before").innerText = before_str
            document.getElementById("new-after").innerText = after_str
            item = document.createElement("div")
            item.className = "hist-item"
            item.innerHTML = f"<span class='hist-meta'>📅 {full_time}</span><span class='label-xs'>Sblm:</span> {before_str}<br><span class='label-xs' style='color:#a855f7'>Ssdh:</span> {after_str}"
            document.getElementById("history-list").prepend(item)
            current_draft = []
            document.getElementById("temp-list").innerText = "Draft: -"

        document.getElementById("add-btn").addEventListener("click", create_proxy(add_data))
        document.getElementById("sort-btn").addEventListener("click", create_proxy(run_sort))
        document.getElementById("full-reset-btn").addEventListener("click", create_proxy(reset_all))
        
        def check_enter(e):
            if e.key == "Enter": add_data(None)
        document.getElementById("single-input").addEventListener("keydown", create_proxy(check_enter))
    </script>
</body>
</html>
