<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Untuk pacarku tersayang - Rena </title>
    
    <link rel="stylesheet" href="https://pyscript.net/releases/2024.1.1/core.css">
    <script type="module" src="https://pyscript.net/releases/2024.1.1/core.js"></script>

    <style>
        body { 
            background-image: url('dut2.jpg'); 
            background-size: cover;
            background-attachment: fixed;
            background-position: center;
            font-family: 'Inter', sans-serif; 
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .wrapper {
            display: flex;
            flex-direction: row; 
            gap: 20px;
            max-width: 900px;
            width: 100%;
            align-items: flex-start;
        }

        .main-container {
            background-color: #fa02d4;
            padding: 30px;
            border-radius: 24px;
            box-shadow: 0 20px 50px rgb(255, 5, 184);
            text-align: center;
            flex: 1; 
        }

        .history-container {
            background-color: rgba(255, 255, 255, 0.9);
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            width: 300px;
            max-height: 500px;
            overflow-y: auto; 
            display: none; 
        }

        .header-box {
            background: linear-gradient(135deg, #5750b4 0%, #e20c9e 100%);
            color: white;
            padding: 25px 20px;
            border-radius: 20px;
            margin-bottom: 20px;
        }

        .header-box h2 { margin: 0; font-size: 22px; text-transform: uppercase; font-weight: 800; }

        .btn-run {
            background: #1e293b;
            color: white;
            padding: 16px;
            border: none;
            border-radius: 16px;
            cursor: pointer;
            font-weight: 600;
            width: 100%;
            margin-bottom: 10px;
            transition: 0.3s;
        }

        .result-box {
            margin-top: 15px;
            padding: 15px;
            border-radius: 12px;
            text-align: left;
            font-family: 'Fira Code', monospace;
            font-size: 14px;
        }

        #box-sebelum { background-color: #fef2f2; color: #991b1b; border: 1px dashed #fecaca; }
        #box-sesudah { background-color: #f0fdf4; color: #166534; border: 1px solid #bbf7d0; }

        .custom-note {
            margin-top: 20px;
            padding: 15px;
            background-color: #f8fafc;
            border-radius: 15px;
            color: #475569;
            font-size: 13px;
            border: 1px solid #e2e8f0;
            display: none;
        }

        .history-title { font-weight: bold; margin-bottom: 10px; color: #1e293b; border-bottom: 2px solid #6366f1; padding-bottom: 5px; }
        .history-item { font-size: 12px; padding: 10px; border-bottom: 1px solid #e2e8f0; color: #475569; font-family: monospace; }

        /* Responsif untuk HP */
        @media (max-width: 768px) {
            .wrapper { flex-direction: column; align-items: center; }
            .history-container { width: 100%; }
        }
    </style>
</head>
<body>

    <div class="wrapper">
        <div class="main-container">
            <div class="header-box">
                <h2>Kayak gini bukan sayang?</h2>
                <p>DIBUAT UNTUK PACARKU (RENA)</p>
            </div>
            
            <button id="run-btn" class="btn-run">DISINI</button>

            <div class="result-box" id="box-sebelum">
                <small>SEBELUM:</small>
                <div id="out-sebelum">-</div>
            </div>

            <div class="result-box" id="box-sesudah">
                <small>SESUDAH:</small>
                <div id="out-sesudah">-</div>
            </div>

            <div id="catatan-bawah" class="custom-note">
                <strong>Penjelasan dari manusia ganteng:</strong><br>
                jadi tuh dia kayak diganti ganti gitu dut dan kalo bingung silahkan tanyakan saja
            </div>
        </div>

        <div class="history-container" id="history-box">
            <div class="history-title">Riwayatmu dut</div>
            <div id="history-list"></div>
        </div>
    </div>

    <script type="py">
        from js import window, document
        from pyodide.ffi import create_proxy

        count = 0

        def start_sorting(event):
            global count
            out_sebelum = document.getElementById("out-sebelum")
            out_sesudah = document.getElementById("out-sesudah")
            note_box = document.getElementById("catatan-bawah")
            hist_box = document.getElementById("history-box")
            hist_list = document.getElementById("history-list")

            n_in = window.prompt("Mau berapa n dut? ")
            if not n_in: return
            
            try:
                n = int(n_in)
                a = []
                for i in range(n):
                    val = window.prompt(f"masukin angka ke-{i+1}nya dut")
                    if "/" in val:
                        p, y = val.split("/")
                        a.append(float(p)/float(y))
                    elif "," in val or "." in val:
                        a.append(float(val.replace(',','.')))
                    else:
                        a.append(int(val))

                def fmt(arr):
                    return "{ " + ", ".join([str(int(x)) if isinstance(x, float) and x.is_integer() else str(x) for x in arr]) + " }"

                out_sebelum.innerText = fmt(a)
                
                # Sorting
                for j in range(n-1):
                    for k in range(j+1, n):
                        if a[j] > a[k]: a[j], a[k] = a[k], a[j]
                
                hasil = fmt(a)
                out_sesudah.innerText = hasil
                
                # Tampilkan Catatan & Riwayat
                note_box.style.display = "block"
                hist_box.style.display = "block"
                
                # Tambah ke History
                count += 1
                item = document.createElement("div")
                item.className = "history-item"
                item.innerText = f"#{count}: {hasil}"
                hist_list.insertBefore(item, hist_list.firstChild)

            except:
                window.alert("Format salah!")

        click_proxy = create_proxy(start_sorting)
        document.getElementById("run-btn").addEventListener("click", click_proxy)
    </script>
</body>
</html>
